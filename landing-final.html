// ─── Countdown Timer ─────────────────────────────────────────────────────
function Countdown() {
  const DURATION = 10 * 60; // 10 minutes in seconds
  const [secs, setSecs] = useState(() => {
    const saved = sessionStorage.getItem('cd_end');
    if (saved) {
      const remaining = Math.floor((parseInt(saved) - Date.now()) / 1000);
      return remaining > 0 ? remaining : DURATION;
    }
    const end = Date.now() + DURATION * 1000;
    sessionStorage.setItem('cd_end', end.toString());
    return DURATION;
  });

  useEffect(() => {
    const t = setInterval(() => {
      setSecs(s => {
        if (s <= 1) {
          // Reset when reaches 0
          const end = Date.now() + DURATION * 1000;
          sessionStorage.setItem('cd_end', end.toString());
          return DURATION;
        }
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(t);
  }, []);

  const m = String(Math.floor(secs / 60)).padStart(2, '0');
  const s = String(secs % 60).padStart(2, '0');
  const pct = ((DURATION - secs) / DURATION) * 100;

  return (
    <div className="mb-8 rounded-2xl border border-lime/30 bg-black/40 p-5 overflow-hidden relative">
      {/* Progress bar */}
      <div className="absolute bottom-0 left-0 h-0.5 bg-lime/20 w-full">
        <div className="h-full bg-lime transition-all duration-1000" style={{ width: `${100 - pct}%` }} />
      </div>
      <div className="flex items-center justify-between gap-4 flex-wrap">
        <div>
          <div className="text-[10px] uppercase tracking-[0.25em] text-white/40 font-body mb-1">⚡ Harga spesial berakhir dalam</div>
          <div className="font-display font-black italic text-white flex items-baseline gap-1" style={{ fontSize: '42px', lineHeight: 1 }}>
            <span className="text-lime lime-glow">{m}</span>
            <span className="text-white/40 text-2xl">:</span>
            <span className="text-lime lime-glow">{s}</span>
          </div>
          <div className="text-[10px] text-white/30 font-body mt-1">menit &nbsp;·&nbsp; detik</div>
        </div>
        <div className="text-right">
          <div className="text-[11px] uppercase tracking-widest text-white/40 font-body mb-1">Sisa harga</div>
          <div className="font-display font-black italic text-white/40 line-through text-xl">Rp 99.000</div>
          <div className="font-display font-black italic text-lime lime-glow text-3xl">Rp 49.000</div>
        </div>
      </div>
    </div>
  );
}
